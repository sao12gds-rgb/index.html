<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minuta Azul</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #eef1f5;
      color: #1f2937;
    }

    body.mobile-device {
      background: #fff;
    }

    .page {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .wizard-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .wizard-badge {
      background: #0b2d5c;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .wizard-title {
      font-size: 18px;
      font-weight: 700;
      color: #0b2d5c;
    }

    .step {
      display: none;
    }

    .step.active-step {
      display: block;
    }

    .card {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
      background: #fff;
    }

    .card-header {
      background: #0b2d5c;
      color: #fff;
      padding: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    .card-body {
      padding: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #dbe5f1;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
      min-height: 42px;
      padding: 8px 0;
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      white-space: normal;
    }

    input[type="radio"] {
      width: auto;
      min-height: auto;
      accent-color: #0b2d5c;
      transform: scale(1.1);
    }

    .review-box {
      border: 1px dashed #94a3b8;
      border-radius: 8px;
      padding: 12px;
      background: #f8fafc;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .status-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status-box.show {
      display: block;
    }

    .status-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .wizard-nav {
      position: sticky;
      bottom: 0;
      background: #fff;
      display: flex;
      gap: 10px;
      padding-top: 12px;
      margin-top: 10px;
      border-top: 1px solid #e5e7eb;
    }

    .wizard-nav button {
      flex: 1;
      min-height: 48px;
      border: none;
      border-radius: 8px;
      background: #0b2d5c;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .wizard-nav button.secondary {
      background: #64748b;
    }

    .wizard-nav button.success {
      background: #166534;
    }

    #btnPdf,
    #btnEnviar {
      display: none;
    }

    .logo-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo-box img {
      max-height: 55px;
      max-width: 180px;
      width: auto;
      height: auto;
    }

    .muted {
      color: #64748b;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      body.mobile-device .page {
        max-width: 100%;
        padding: 12px;
      }

      .grid,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .wizard-title {
        font-size: 16px;
      }

      input,
      select,
      textarea {
        font-size: 16px;
      }

      .wizard-nav {
        padding-bottom: 8px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .wizard-top,
      .wizard-nav,
      .status-box {
        display: none !important;
      }

      .step {
        display: block !important;
      }

      .page {
        max-width: none;
        padding: 0;
      }

      .card {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wizard-top">
      <div class="wizard-title">Minuta de Despacho de Carga</div>
      <div class="wizard-badge" id="wizardStepLabel">Etapa 1 de 11</div>
    </div>

    <form id="minutaForm">
      <input type="hidden" name="tipo_dispositivo" id="tipo_dispositivo">
      <input type="hidden" name="largura_tela" id="largura_tela">
      <input type="hidden" name="altura_tela" id="altura_tela">
      <input type="hidden" name="user_agent" id="user_agent">
      <input type="hidden" name="pdf_base64" id="pdf_base64">

      <!-- ETAPA 1 -->
      <section class="step active-step">
        <div class="card">
          <div class="card-header">1. Identificação</div>
          <div class="card-body">
            <div class="logo-box">
              <img src="logo-azulcargo.png" alt="Logo Azul Cargo">
              <div class="muted">Preencha uma etapa por vez</div>
            </div>
            <div class="grid" style="margin-top:12px;">
              <div class="field">
                <label for="numero_coleta">Nº da coleta</label>
                <input id="numero_coleta" name="numero_coleta" type="text">
              </div>
              <div class="field">
                <label>Tipo de serviço</label>
                <div class="radio-group">
                  <label class="radio-option"><input type="radio" name="tipo_servico" value="Expresso">Expresso</label>
                  <label class="radio-option"><input type="radio" name="tipo_servico" value="Premium">Premium</label>
                  <label class="radio-option"><input type="radio" name="tipo_servico" value="Ecommerce">Ecommerce</label>
                  <label class="radio-option"><input type="radio" name="tipo_servico" value="Standard">Standard</label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 2 -->
      <section class="step">
        <div class="card">
          <div class="card-header">2. Pagamento de frete / tomador</div>
          <div class="card-body">
            <div class="grid">
              <div class="field">
                <label>Pagamento de frete</label>
                <div class="radio-group">
                  <label class="radio-option"><input type="radio" name="frete" value="Pago na origem" checked>Pago na origem</label>
                  <label class="radio-option"><input type="radio" name="frete" value="Cliente correntista">Cliente correntista</label>
                </div>
              </div>
              <div class="field">
                <label>Tomador</label>
                <div class="radio-group">
                  <label class="radio-option"><input type="radio" name="tomador" value="Remetente">Remetente</label>
                  <label class="radio-option"><input type="radio" name="tomador" value="Destinatário">Destinatário</label>
                </div>
              </div>
            </div>
            <div class="grid-1">
              <div class="field">
                <label for="cnpj_frete">CNPJ do tomador</label>
                <input id="cnpj_frete" class="cpf" name="cnpj_frete" maxlength="18" placeholder="00.000.000/0000-00">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 3 -->
      <section class="step">
        <div class="card">
          <div class="card-header">3. Forma de entrega</div>
          <div class="card-body">
            <div class="field">
              <label>Forma de entrega</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="forma_entrega" value="Entrega no endereço" onclick="toggleAero(false)">
                  Entrega no endereço
                </label>
                <label class="radio-option">
                  <input type="radio" name="forma_entrega" value="Retirada na unidade" onclick="toggleAero(true)">
                  Retirada na unidade
                </label>
              </div>
            </div>

            <div class="field" id="blocoAeroporto" style="display:none;">
              <label for="local_retirada">Local retirada</label>
              <input list="listaAero" id="local_retirada" name="local_retirada">
              <datalist id="listaAero">
                <option value="AAX"><option value="AFL"><option value="AJU"><option value="BEL">
                <option value="BSB"><option value="CGB"><option value="CGH"><option value="CNF">
                <option value="CWB"><option value="FLN"><option value="FOR"><option value="GIG">
                <option value="GRU"><option value="GYN"><option value="IGU"><option value="JPA">
                <option value="MAO"><option value="MCZ"><option value="NAT"><option value="POA">
                <option value="PVH"><option value="REC"><option value="SDU"><option value="SSA">
                <option value="VCP"><option value="VIX"><option value="CDSP1"><option value="CDSP2">
              </datalist>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 4 -->
      <section class="step">
        <div class="card">
          <div class="card-header">4. Remetente</div>
          <div class="card-body">
            <div class="grid">
              <div class="field">
                <label for="remetente_nome">Nome</label>
                <input id="remetente_nome" name="remetente_nome" type="text">
              </div>
              <div class="field">
                <label for="remetente_cpf_cnpj">CPF/CNPJ</label>
                <input id="remetente_cpf_cnpj" class="cpf" name="remetente_cpf_cnpj" type="text">
              </div>
              <div class="field">
                <label for="remetente_endereco">Endereço</label>
                <input id="remetente_endereco" name="remetente_endereco" type="text">
              </div>
              <div class="field">
                <label for="remetente_numero">Nº</label>
                <input id="remetente_numero" name="remetente_numero" type="text">
              </div>
              <div class="field">
                <label for="remetente_complemento">Complemento</label>
                <input id="remetente_complemento" name="remetente_complemento" type="text">
              </div>
              <div class="field">
                <label for="remetente_cidade">Cidade</label>
                <input id="remetente_cidade" name="remetente_cidade" type="text">
              </div>
              <div class="field">
                <label for="remetente_cep">CEP</label>
                <input id="remetente_cep" class="cep" name="remetente_cep" type="text">
              </div>
              <div class="field">
                <label for="remetente_telefone">Telefone</label>
                <input id="remetente_telefone" name="remetente_telefone" type="text">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 5 -->
      <section class="step">
        <div class="card">
          <div class="card-header">5. Destinatário</div>
          <div class="card-body">
            <div class="grid">
              <div class="field">
                <label for="destinatario_nome">Nome</label>
                <input id="destinatario_nome" name="destinatario_nome" type="text">
              </div>
              <div class="field">
                <label for="destinatario_cpf_cnpj">CPF/CNPJ</label>
                <input id="destinatario_cpf_cnpj" class="cpf" name="destinatario_cpf_cnpj" type="text">
              </div>
              <div class="field">
                <label for="destinatario_endereco">Endereço</label>
                <input id="destinatario_endereco" name="destinatario_endereco" type="text">
              </div>
              <div class="field">
                <label for="destinatario_numero">Nº</label>
                <input id="destinatario_numero" name="destinatario_numero" type="text">
              </div>
              <div class="field">
                <label for="destinatario_complemento">Complemento</label>
                <input id="destinatario_complemento" name="destinatario_complemento" type="text">
              </div>
              <div class="field">
                <label for="destinatario_cidade">Cidade</label>
                <input id="destinatario_cidade" name="destinatario_cidade" type="text">
              </div>
              <div class="field">
                <label for="destinatario_cep">CEP</label>
                <input id="destinatario_cep" class="cep" name="destinatario_cep" type="text">
              </div>
              <div class="field">
                <label for="destinatario_telefone">Telefone</label>
                <input id="destinatario_telefone" name="destinatario_telefone" type="text">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 6 -->
      <section class="step">
        <div class="card">
          <div class="card-header">6. Informações da carga</div>
          <div class="card-body">
            <div class="grid-3">
              <div class="field">
                <label for="volumes">Volumes</label>
                <input id="volumes" name="volumes" type="text">
              </div>
              <div class="field">
                <label for="peso_kg">Peso (kg)</label>
                <input id="peso_kg" name="peso_kg" type="text">
              </div>
              <div class="field">
                <label for="dimensoes">Dimensões</label>
                <input id="dimensoes" name="dimensoes" type="text">
              </div>
            </div>
            <div class="grid">
              <div class="field">
                <label for="tipo_embalagem">Tipo de embalagem</label>
                <input id="tipo_embalagem" name="tipo_embalagem" type="text">
              </div>
              <div class="field">
                <label for="descricao_carga">Descrição</label>
                <input id="descricao_carga" name="descricao_carga" type="text">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 7 -->
      <section class="step">
        <div class="card">
          <div class="card-header">7. Documentação</div>
          <div class="card-body">
            <div class="grid">
              <div class="field">
                <label>Documento</label>
                <div class="radio-group">
                  <label class="radio-option"><input type="radio" name="tipo_documento" id="docNotaFiscal" value="Nota fiscal">Nota fiscal</label>
                  <label class="radio-option"><input type="radio" name="tipo_documento" id="docDeclaracao" value="Declaração de conteúdo">Declaração de conteúdo</label>
                </div>
              </div>
              <div class="field">
                <label for="valor_documento">Valor (R$)</label>
                <input id="valor_documento" class="money" name="valor_documento" type="text">
              </div>
            </div>

            <div class="grid-1" id="blocoNumeroNota" style="display:none;">
              <div class="field">
                <label for="numero_nota_fiscal">Número da nota fiscal</label>
                <input id="numero_nota_fiscal" name="numero_nota_fiscal" type="text" placeholder="Digite o número da nota fiscal">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 8 -->
      <section class="step">
        <div class="card">
          <div class="card-header">8. Declaração</div>
          <div class="card-body">
            <div class="field">
              <label for="declaracao_texto">Texto da declaração</label>
              <textarea id="declaracao_texto" name="declaracao_texto">Autorizo a emissão do conhecimento aéreo e o transporte do(s) volume(s) conforme especificações acima neste documento, responsabilizando-me por eventuais atrasos ou prejuízos decorrentes de informações incorretas ou incompletas nesta minuta. Declaro que os volumes foram devidamente conferidos, estão de acordo com a descrição informada e acondicionados em embalagem adequada para o transporte até a entrega ao destinatário.</textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 9 -->
      <section class="step">
        <div class="card">
          <div class="card-header">9. Responsável</div>
          <div class="card-body">
            <div class="grid">
              <div class="field">
                <label for="responsavel_local">Local</label>
                <input id="responsavel_local" name="responsavel_local" type="text">
              </div>
              <div class="field">
                <label for="responsavel_data">Data</label>
                <input id="responsavel_data" class="data" name="responsavel_data" type="text">
              </div>
              <div class="field">
                <label for="responsavel_rg">RG</label>
                <input id="responsavel_rg" class="rg" name="responsavel_rg" type="text">
              </div>
              <div class="field">
                <label for="responsavel_nome">Nome</label>
                <input id="responsavel_nome" name="responsavel_nome" type="text">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 10 -->
      <section class="step">
        <div class="card">
          <div class="card-header">10. Observações finais</div>
          <div class="card-body">
            <div class="field">
              <label for="observacoes">Observações</label>
              <textarea id="observacoes" name="observacoes"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- ETAPA 11 -->
      <section class="step">
        <div class="card">
          <div class="card-header">11. Revisão final</div>
          <div class="card-body">
            <div class="review-box" id="reviewBox"></div>
            <div id="statusBox" class="status-box"></div>
          </div>
        </div>
      </section>
    </form>

    <div class="wizard-nav">
      <button type="button" id="btnVoltar" class="secondary">Voltar</button>
      <button type="button" id="btnProximo">Próximo</button>
      <button type="button" id="btnPdf">Baixar PDF</button>
      <button type="button" id="btnEnviar" class="success">Enviar</button>
    </div>
  </div>

  <script>
    function detectarCelular() {
      const ua = navigator.userAgent || "";
      const ehMobileUA = /Android|iPhone|iPod|iPad|Opera Mini|IEMobile|Mobile/i.test(ua);
      const ehTelaPequena = window.innerWidth <= 768;

      if (ehMobileUA || ehTelaPequena) {
        document.body.classList.add("mobile-device");
      } else {
        document.body.classList.remove("mobile-device");
      }

      document.getElementById("tipo_dispositivo").value = (ehMobileUA || ehTelaPequena) ? "MOBILE" : "DESKTOP";
      document.getElementById("largura_tela").value = window.innerWidth || "";
      document.getElementById("altura_tela").value = window.innerHeight || "";
      document.getElementById("user_agent").value = navigator.userAgent || "";
    }

    window.addEventListener("load", detectarCelular);
    window.addEventListener("resize", detectarCelular);

    const steps = document.querySelectorAll(".step");
    const stepLabel = document.getElementById("wizardStepLabel");
    const btnVoltar = document.getElementById("btnVoltar");
    const btnProximo = document.getElementById("btnProximo");
    const btnPdf = document.getElementById("btnPdf");
    const btnEnviar = document.getElementById("btnEnviar");
    const reviewBox = document.getElementById("reviewBox");
    const statusBox = document.getElementById("statusBox");
    const form = document.getElementById("minutaForm");
    let etapaAtual = 0;

    function mostrarStatus(tipo, texto) {
      statusBox.className = "status-box show " + (tipo === "success" ? "status-success" : "status-error");
      statusBox.textContent = texto;
    }

    function limparStatus() {
      statusBox.className = "status-box";
      statusBox.textContent = "";
    }

    function mostrarEtapa(index) {
      steps.forEach((step, i) => {
        step.classList.toggle("active-step", i === index);
      });

      stepLabel.textContent = `Etapa ${index + 1} de ${steps.length}`;
      btnVoltar.style.display = index === 0 ? "none" : "block";

      const ultima = index === steps.length - 1;
      btnProximo.style.display = ultima ? "none" : "block";
      btnPdf.style.display = ultima ? "block" : "none";
      btnEnviar.style.display = ultima ? "block" : "none";

      if (ultima) {
        montarRevisao();
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
      limparStatus();
    }

    btnVoltar.addEventListener("click", () => {
      if (etapaAtual > 0) {
        etapaAtual--;
        mostrarEtapa(etapaAtual);
      }
    });

    btnProximo.addEventListener("click", () => {
      if (etapaAtual < steps.length - 1) {
        etapaAtual++;
        mostrarEtapa(etapaAtual);
      }
    });

    function toggleAero(show) {
      const bloco = document.getElementById("blocoAeroporto");
      const campo = document.getElementById("local_retirada");

      bloco.style.display = show ? "block" : "none";
      if (!show) campo.value = "";
    }

    function toggleNumeroNotaFiscal() {
      const docNota = document.getElementById("docNotaFiscal");
      const bloco = document.getElementById("blocoNumeroNota");
      const campo = document.getElementById("numero_nota_fiscal");

      if (docNota && docNota.checked) {
        bloco.style.display = "block";
      } else {
        bloco.style.display = "none";
        campo.value = "";
      }
    }

    document.querySelectorAll('input[name="tipo_documento"]').forEach(r => {
      r.addEventListener("change", toggleNumeroNotaFiscal);
    });

    document.querySelectorAll(".cep").forEach(el => {
      el.addEventListener("input", () => {
        let v = el.value.replace(/\D/g, '').slice(0, 8);
        v = v.replace(/(\d{5})(\d)/, "$1-$2");
        el.value = v;
      });
    });

    document.querySelectorAll(".cpf").forEach(el => {
      el.addEventListener("input", () => {
        let v = el.value.replace(/\D/g, '');
        if (v.length <= 11) {
          v = v.replace(/(\d{3})(\d)/, "$1.$2");
          v = v.replace(/(\d{3})(\d)/, "$1.$2");
          v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        } else {
          v = v.slice(0, 14);
          v = v.replace(/^(\d{2})(\d)/, "$1.$2");
          v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
          v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
          v = v.replace(/(\d{4})(\d)/, "$1-$2");
        }
        el.value = v;
      });
    });

    document.querySelectorAll(".rg").forEach(el => {
      el.addEventListener("input", () => {
        let v = el.value.replace(/\D/g, '').slice(0, 9);
        v = v.replace(/(\d{2})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1-$2");
        el.value = v;
      });
    });

    document.querySelectorAll(".data").forEach(el => {
      el.addEventListener("input", () => {
        let v = el.value.replace(/\D/g, '').slice(0, 8);
        v = v.replace(/(\d{2})(\d)/, "$1/$2");
        v = v.replace(/(\d{2})(\d)/, "$1/$2");
        el.value = v;
      });
    });

    document.querySelectorAll(".money").forEach(el => {
      el.addEventListener("input", () => {
        let v = el.value.replace(/\D/g, '');
        if (!v) {
          el.value = "";
          return;
        }
        v = (v / 100).toFixed(2);
        v = v.replace(".", ",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        el.value = "R$ " + v;
      });
    });

    const radiosFrete = document.querySelectorAll('input[name="frete"]');
    const campoCnpjFrete = document.getElementById("cnpj_frete");

    function atualizarEstadoFrete() {
      const selecionado = document.querySelector('input[name="frete"]:checked');
      if (selecionado && selecionado.value === "Pago na origem") {
        campoCnpjFrete.value = "";
        campoCnpjFrete.disabled = true;
        campoCnpjFrete.style.backgroundColor = "#f0f0f0";
      } else {
        campoCnpjFrete.disabled = false;
        campoCnpjFrete.style.backgroundColor = "#dbe5f1";
      }
    }

    radiosFrete.forEach(r => r.addEventListener("change", atualizarEstadoFrete));
    atualizarEstadoFrete();

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function coletarDados() {
      const formData = new FormData(form);
      const data = {};

      for (const [key, value] of formData.entries()) {
        data[key] = value;
      }

      data.tipo_servico = getRadioValue("tipo_servico");
      data.frete = getRadioValue("frete");
      data.tomador = getRadioValue("tomador");
      data.forma_entrega = getRadioValue("forma_entrega");
      data.tipo_documento = getRadioValue("tipo_documento");

      return data;
    }

    function montarRevisao() {
      const d = coletarDados();

      const texto = [
        `Nº coleta: ${d.numero_coleta || ""}`,
        `Tipo de serviço: ${d.tipo_servico || ""}`,
        `Pagamento frete: ${d.frete || ""}`,
        `Tomador: ${d.tomador || ""}`,
        `CNPJ tomador: ${d.cnpj_frete || ""}`,
        `Forma de entrega: ${d.forma_entrega || ""}`,
        `Local retirada: ${d.local_retirada || ""}`,
        ``,
        `REMETENTE`,
        `Nome: ${d.remetente_nome || ""}`,
        `CPF/CNPJ: ${d.remetente_cpf_cnpj || ""}`,
        `Endereço: ${d.remetente_endereco || ""}, ${d.remetente_numero || ""}`,
        `Complemento: ${d.remetente_complemento || ""}`,
        `Cidade: ${d.remetente_cidade || ""}`,
        `CEP: ${d.remetente_cep || ""}`,
        `Telefone: ${d.remetente_telefone || ""}`,
        ``,
        `DESTINATÁRIO`,
        `Nome: ${d.destinatario_nome || ""}`,
        `CPF/CNPJ: ${d.destinatario_cpf_cnpj || ""}`,
        `Endereço: ${d.destinatario_endereco || ""}, ${d.destinatario_numero || ""}`,
        `Complemento: ${d.destinatario_complemento || ""}`,
        `Cidade: ${d.destinatario_cidade || ""}`,
        `CEP: ${d.destinatario_cep || ""}`,
        `Telefone: ${d.destinatario_telefone || ""}`,
        ``,
        `CARGA`,
        `Volumes: ${d.volumes || ""}`,
        `Peso (kg): ${d.peso_kg || ""}`,
        `Dimensões: ${d.dimensoes || ""}`,
        `Tipo embalagem: ${d.tipo_embalagem || ""}`,
        `Descrição: ${d.descricao_carga || ""}`,
        ``,
        `DOCUMENTAÇÃO`,
        `Tipo: ${d.tipo_documento || ""}`,
        `Valor: ${d.valor_documento || ""}`,
        `Número NF: ${d.numero_nota_fiscal || ""}`,
        ``,
        `RESPONSÁVEL`,
        `Local: ${d.responsavel_local || ""}`,
        `Data: ${d.responsavel_data || ""}`,
        `RG: ${d.responsavel_rg || ""}`,
        `Nome: ${d.responsavel_nome || ""}`,
        ``,
        `Observações: ${d.observacoes || ""}`
      ].join("\n");

      reviewBox.textContent = texto;
    }

    async function gerarPdfBase64() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "mm", format: "a4" });
      const d = coletarDados();

      const linhas = [
        "MINUTA DE DESPACHO DE CARGA",
        "",
        `Nº DA COLETA: ${d.numero_coleta || ""}`,
        `TIPO DE SERVIÇO: ${d.tipo_servico || ""}`,
        `PAGAMENTO DE FRETE: ${d.frete || ""}`,
        `TOMADOR: ${d.tomador || ""}`,
        `CNPJ TOMADOR: ${d.cnpj_frete || ""}`,
        `FORMA DE ENTREGA: ${d.forma_entrega || ""}`,
        `LOCAL RETIRADA: ${d.local_retirada || ""}`,
        "",
        "REMETENTE",
        `Nome: ${d.remetente_nome || ""}`,
        `CPF/CNPJ: ${d.remetente_cpf_cnpj || ""}`,
        `Endereço: ${d.remetente_endereco || ""}, ${d.remetente_numero || ""}`,
        `Complemento: ${d.remetente_complemento || ""}`,
        `Cidade: ${d.remetente_cidade || ""}`,
        `CEP: ${d.remetente_cep || ""}`,
        `Telefone: ${d.remetente_telefone || ""}`,
        "",
        "DESTINATÁRIO",
        `Nome: ${d.destinatario_nome || ""}`,
        `CPF/CNPJ: ${d.destinatario_cpf_cnpj || ""}`,
        `Endereço: ${d.destinatario_endereco || ""}, ${d.destinatario_numero || ""}`,
        `Complemento: ${d.destinatario_complemento || ""}`,
        `Cidade: ${d.destinatario_cidade || ""}`,
        `CEP: ${d.destinatario_cep || ""}`,
        `Telefone: ${d.destinatario_telefone || ""}`,
        "",
        "INFORMAÇÕES DA CARGA",
        `Volumes: ${d.volumes || ""}`,
        `Peso (kg): ${d.peso_kg || ""}`,
        `Dimensões: ${d.dimensoes || ""}`,
        `Tipo embalagem: ${d.tipo_embalagem || ""}`,
        `Descrição: ${d.descricao_carga || ""}`,
        "",
        "DOCUMENTAÇÃO",
        `Tipo: ${d.tipo_documento || ""}`,
        `Valor: ${d.valor_documento || ""}`,
        `Número NF: ${d.numero_nota_fiscal || ""}`,
        "",
        "DECLARAÇÃO",
        d.declaracao_texto || "",
        "",
        "RESPONSÁVEL",
        `Local: ${d.responsavel_local || ""}`,
        `Data: ${d.responsavel_data || ""}`,
        `RG: ${d.responsavel_rg || ""}`,
        `Nome: ${d.responsavel_nome || ""}`,
        "",
        `Observações: ${d.observacoes || ""}`
      ];

      let y = 12;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.text("MINUTA DE DESPACHO DE CARGA", 10, y);
      y += 8;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);

      linhas.slice(2).forEach((linha) => {
        const quebradas = doc.splitTextToSize(linha, 190);
        if (y + quebradas.length * 5 > 285) {
          doc.addPage();
          y = 12;
        }
        doc.text(quebradas, 10, y);
        y += quebradas.length * 5 + 1;
      });

      const arrayBuffer = doc.output("arraybuffer");
      const bytes = new Uint8Array(arrayBuffer);
      let binary = "";
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64 = btoa(binary);
      document.getElementById("pdf_base64").value = base64;
      return { doc, base64 };
    }

    btnPdf.addEventListener("click", async () => {
      try {
        const { doc } = await gerarPdfBase64();
        const numero = document.getElementById("numero_coleta").value || "minuta";
        doc.save(`minuta-${numero}.pdf`);
      } catch (e) {
        mostrarStatus("error", "Falha ao gerar PDF.");
      }
    });

    btnEnviar.addEventListener("click", async () => {
      try {
        const { base64 } = await gerarPdfBase64();
        const payload = coletarDados();
        payload.pdf_base64 = base64;

        const response = await fetch("/api/minutas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Falha ao enviar.");
        }

        mostrarStatus("success", `Minuta enviada com sucesso. ID: ${result.id}`);
      } catch (e) {
        mostrarStatus("error", e.message || "Erro no envio.");
      }
    });

    toggleNumeroNotaFiscal();
    mostrarEtapa(etapaAtual);
  </script>
</body>
</html>
