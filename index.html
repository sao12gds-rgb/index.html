<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minuta Azul</title>

<style>
*{box-sizing:border-box;}

html, body{
width:100%;
max-width:100%;
overflow-x:hidden;
}

body{
font-family:Arial;
background:#eee;
margin:0;
padding:10px;
}

/* DESKTOP */
.page{
width:210mm;
height:297mm;
margin:auto;
background:#fff;
padding:5mm;
}

/* BASE */
table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td{
border:1px solid #000;
padding:4px;
}

.header{
background:#0b2d5c;
color:#fff;
font-weight:bold;
}

input:not([type="radio"]){
width:100%;
border:none;
background:#dbe5f1;
font-weight:bold;
height:18px;
outline:none;
}

input[type="radio"]{
margin-right:6px;
accent-color:#0b2d5c;
}

.frete-opcao{
display:inline-flex;
align-items:center;
margin-right:20px;
}

button{
width:100%;
padding:12px;
background:#0b2d5c;
color:#fff;
border:none;
margin-top:10px;
font-size:16px;
}

/* MOBILE REAL */
body.mobile-device{
padding:0;
background:#fff;
}

body.mobile-device .page{
width:100%;
height:auto;
margin:0;
padding:10px;
}

body.mobile-device table{
width:100%;
}

body.mobile-device tr{
display:block;
margin-bottom:8px;
}

body.mobile-device td{
display:block;
width:100% !important;
border-bottom:1px solid #000;
}

body.mobile-device input:not([type="radio"]){
height:40px;
font-size:16px;
}

body.mobile-device .frete-opcao{
display:flex;
margin-bottom:6px;
}

body.mobile-device img{
max-width:140px;
margin:auto;
display:block;
}

body.mobile-device button{
min-height:48px;
}

/* IMPRESSÃO */
@media print{
body{
-webkit-print-color-adjust: exact;
print-color-adjust: exact;
}

.header{
background:#0b2d5c !important;
color:#fff !important;
}

input{
background:#dbe5f1 !important;
}

button{display:none;}

.page{
width:210mm;
height:297mm;
padding:5mm;
}
}
</style>
</head>

<body>

<div class="page">

<table>
<tr>
<td style="width:30%"><img src="logo-azulcargo.png" style="height:55px;"></td>
<td style="text-align:center"><b>MINUTA DE DESPACHO DE CARGA</b></td>
<td><b>Nº DA COLETA</b><input></td>
</tr>
</table>

<table>
<tr><td colspan="8" class="header">1. TIPO DE SERVIÇO</td></tr>
<tr>
<td><input type="radio" name="serv"></td><td>Expresso</td>
<td><input type="radio" name="serv"></td><td>Premium</td>
<td><input type="radio" name="serv"></td><td>Ecommerce</td>
<td><input type="radio" name="serv"></td><td>Standard</td>
</tr>
</table>

<table>
<tr><td colspan="8" class="header">2. PAGAMENTO DE FRETE</td></tr>
<tr>
<td>Pagamento</td>
<td colspan="7">
<label class="frete-opcao"><input type="radio" name="frete">Origem</label>
<label class="frete-opcao"><input type="radio" name="frete">Correntista</label>
</td>
</tr>
</table>

<button onclick="window.print()">GERAR PDF</button>

</div>

<script>

/* DETECTA CELULAR */
function detectarCelular(){
const ua = navigator.userAgent || "";
const mobile = /Android|iPhone|iPod|Mobile/i.test(ua) || window.innerWidth <= 768;

if(mobile){
document.body.classList.add("mobile-device");
}else{
document.body.classList.remove("mobile-device");
}
}

window.addEventListener("load", detectarCelular);
window.addEventListener("resize", detectarCelular);

</script>

</body>
</html>
